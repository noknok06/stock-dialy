{% extends 'base.html' %}

{% block title %}テンプレートの削除 | カブログ{% endblock %}

{% block content %}
<div class="container py-4">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card">
        <div class="card-header bg-danger text-white">
          <h4 class="mb-0">
            <i class="bi bi-exclamation-triangle me-2"></i>テンプレートの削除
          </h4>
        </div>
        <div class="card-body text-center py-5">
          <i class="bi bi-exclamation-triangle-fill text-danger" style="font-size: 3rem;"></i>
          <h5 class="mt-3">このテンプレートを削除してもよろしいですか？</h5>
          <p class="mt-3">
            <span class="badge bg-light text-dark fs-6">
              <i class="bi bi-file-earmark-text me-1"></i>{{ object.title }}
            </span>
          </p>
          <p class="text-muted mt-3">
            この操作は元に戻すことができません。<br>
            既に作成済みの日記には影響しません。
          </p>

          <form method="post" class="mt-4">
            {% csrf_token %}
            <div class="d-flex justify-content-center gap-2">
              <a href="{% url 'diary_templates:list' %}" class="btn btn-outline-secondary">
                <i class="bi bi-x-lg me-1"></i>キャンセル
              </a>
              <button type="submit" class="btn btn-danger">
                <i class="bi bi-trash me-1"></i>削除する
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
