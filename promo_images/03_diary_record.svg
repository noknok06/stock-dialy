  <text x="632" y="478" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="600" fill="#7c3aed">💡 気づき・振り返り</text>
  <text x="1120" y="478" text-anchor="end" font-family="sans-serif" font-size="11" fill="#94a3b8">2025/01/10</text>
  <text x="632" y="498" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#1e293b">購入当初は「EV乗り遅れ」の懸念が強かったが、HV戦略の</text>
  <text x="632" y="516" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#1e293b">正しさが証明されつつある。逆張りの判断は正解だった。</text>

