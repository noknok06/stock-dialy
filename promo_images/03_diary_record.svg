  <text x="632" y="185" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#1e293b">北米市場でのHV好調が主因。来期ガイダンスも強気。</text>
  <text x="632" y="203" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#1e293b">→ 目標株価を ¥3,200 → ¥3,500 に上方修正。</text>
