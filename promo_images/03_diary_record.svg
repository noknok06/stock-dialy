  <!-- Markdown rendered content -->
  <text x="70" y="240" font-family="'Noto Sans JP', sans-serif" font-size="16" font-weight="700" fill="#1e293b">## 投資理由</text>
  <rect x="70" y="248" width="200" height="2" fill="#e2e8f0"/>

  <text x="70" y="272" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#374151">EV シフトの中でも</text>
  <text x="210" y="272" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#2563eb" text-decoration="underline">#ハイブリッド</text>
  <text x="315" y="272" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#374151">戦略の優位性を評価。</text>
  <text x="70" y="292" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#374151">全固体電池の開発状況とサプライチェーン再編への対応力が</text>
  <text x="70" y="312" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#374151">他社との差別化要因と判断。</text>

  <text x="70" y="338" font-family="'Noto Sans JP', sans-serif" font-size="15" font-weight="700" fill="#1e293b">### リスク要因</text>

