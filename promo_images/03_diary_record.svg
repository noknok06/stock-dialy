  <text x="632" y="289" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#1e293b">全固体電池の量産化ロードマップ発表。2027年の車載搭載を目指す。</text>
  <text x="632" y="307" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#1e293b">パナソニック・プライムプラネットとの共同開発加速。</text>
  <rect x="632" y="323" width="55" height="18" rx="9" fill="#dcfce7"/>
  <text x="659" y="336" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#059669">重要度 中</text>

  <!-- Note 3 -->
  <rect x="610" y="354" width="548" height="90" rx="10" fill="#fff7ed" stroke="#fed7aa" stroke-width="1"/>
  <rect x="610" y="354" width="4" height="90" rx="2" fill="#f59e0b"/>
  <text x="632" y="376" font-family="'Noto Sans JP', sans-serif" font-size="11" font-weight="600" fill="#d97706">⚠️ リスク要因</text>
  <text x="1120" y="376" text-anchor="end" font-family="sans-serif" font-size="11" fill="#94a3b8">2025/02/28</text>
  <text x="632" y="396" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#1e293b">円高進行（1ドル=142円→138円）。主要為替感応度は1円で</text>
  <text x="632" y="414" font-family="'Noto Sans JP', sans-serif" font-size="13" fill="#1e293b">約400億円の営業利益影響。短期的な下押し圧力に注意。</text>
  <rect x="632" y="430" width="55" height="18" rx="9" fill="#fef3c7"/>
