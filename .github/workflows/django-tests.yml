name: Django CI/CD

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Cache apt packages
        uses: actions/cache@v4
        id: apt-cache
        with:
          path: /var/cache/apt/archives
          key: ${{ runner.os }}-apt-${{ hashFiles('.github/workflows/django-tests.yml') }}
          restore-keys: ${{ runner.os }}-apt-

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q \
            libpq-dev libjpeg-dev zlib1g-dev libfreetype6-dev \
            liblcms2-dev libwebp-dev libharfbuzz-dev libfribidi-dev libpng-dev

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install flake8 pytest-cov pytest-django

      - name: Create logs directory
        run: mkdir -p logs

      - name: Lint (syntax errors & undefined names)
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Run tests with coverage
        run: pytest tests/ --cov --cov-report=term-missing
        env:
          DJANGO_SETTINGS_MODULE: config.test_settings
          DJANGO_TESTING: '1'

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            set -e
            cd /var/www/django/stock-dialy
            source venv/bin/activate
            git pull
            pip install -r requirements.txt
            python manage.py collectstatic --noinput --settings=config.settings
            python manage.py makemigrations --settings=config.settings
            python manage.py migrate --settings=config.settings
            sudo systemctl restart gunicorn
