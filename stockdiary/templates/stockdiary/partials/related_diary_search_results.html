{% if query %}
  {% if results %}
  <ul class="list-group list-group-flush">
    {% for result in results %}
    <li class="list-group-item d-flex justify-content-between align-items-center px-1 py-2">
      <div class="d-flex align-items-center gap-2 flex-grow-1 me-2">
        <i class="bi bi-journal-text text-secondary"></i>
        <span class="fw-medium">{{ result.stock_name }}</span>
        {% if result.stock_symbol %}
        <span class="text-muted small">{{ result.stock_symbol }}</span>
        {% endif %}
      </div>
      <button class="btn btn-sm btn-outline-primary flex-shrink-0"
              hx-post="{% url 'stockdiary:related_add' diary.id result.id %}"
              hx-target="#linked-diaries-section"
              hx-swap="outerHTML"
              title="関連付けを追加">
        <i class="bi bi-plus-lg me-1"></i>追加
      </button>
    </li>
    {% endfor %}
  </ul>
  {% else %}
  <p class="text-muted small mb-0 ps-1">
    <i class="bi bi-search me-1"></i>「{{ query }}」に一致する日記は見つかりませんでした
  </p>
  {% endif %}
{% endif %}
