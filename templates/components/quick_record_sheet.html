{% comment %}
クイック記録用ボトムシート
使用方法: {% include 'components/quick_record_sheet.html' %}
{% endcomment %}

<div class="bottom-sheet" id="quickRecordSheet" aria-hidden="true">
  <div class="bottom-sheet-backdrop"></div>

  <div class="bottom-sheet-content">
    <!-- ドラッグハンドル -->
    <div class="bottom-sheet-handle" aria-label="シートを閉じるにはドラッグしてください"></div>

    <!-- ヘッダー -->
    <div class="bottom-sheet-header">
      <h3>
        <i class="bi bi-lightning-charge-fill" style="color: var(--warning-color, #f59e0b);"></i>
        クイック記録
      </h3>
      <button type="button" class="btn-close" aria-label="閉じる">
        <i class="bi bi-x-lg"></i>
      </button>
    </div>

    <!-- ボディ -->
    <div class="bottom-sheet-body">
      <form id="quickRecordForm" method="post" action="{% url 'stockdiary:quick_create' %}">
        {% csrf_token %}

        <!-- 銘柄名 -->
        <div class="mb-3">
          <label for="stock_name_quick">
            銘柄名（任意）
          </label>
          <div class="input-with-suggestions">
            <input
              type="text"
              name="stock_name"
              id="stock_name_quick"
              class="form-control form-control-lg"
              placeholder="例: トヨタ自動車 または 7203"
              autocomplete="off"
              aria-describedby="stock_name_help">

            <div class="form-text small text-muted mt-2" id="stock_name_help">
              💡 銘柄コードまたは会社名を入力（空欄でメモのみ記録も可能）
            </div>

            <!-- オートコンプリート候補 -->
            <div class="suggestions-inline" id="suggestions_quick" role="listbox">
              <div class="suggestions-list"></div>
            </div>
          </div>
        </div>

        <!-- メモ -->
        <div class="mb-3">
          <label for="reason_quick">メモ（任意）</label>
          <textarea
            name="reason"
            id="reason_quick"
            class="form-control"
            rows="5"
            placeholder="気になるポイントや考察を自由に記録..."
            maxlength="2000"></textarea>
          <div class="form-text small text-muted mt-1">
            <i class="bi bi-info-circle me-1"></i>
            2000文字まで入力可能
          </div>
        </div>

        <!-- 送信ボタン -->
        <div class="d-grid">
          <button type="submit" class="btn btn-success btn-lg" id="submitBtn">
            <i class="bi bi-check-lg me-1"></i>
            保存
          </button>
        </div>
      </form>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  // フォーム送信時の処理
  const form = document.getElementById('quickRecordForm');
  form.addEventListener('submit', function(e) {
    e.preventDefault();

    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>保存中...';

    const formData = new FormData(form);

    fetch(form.action, {
      method: 'POST',
      body: formData,
      headers: {
        'X-Requested-With': 'XMLHttpRequest'
      }
    })
    .then(response => response.json())
    .then(data => {
      if (data.success) {
        if (navigator.vibrate) {
          navigator.vibrate([10, 5, 10]);
        }

        closeBottomSheet('quickRecordSheet');
        showToast('success', 'クイック記録を作成しました');

        if (data.redirect_url) {
          setTimeout(() => {
            window.location.href = data.redirect_url;
          }, 500);
        } else {
          setTimeout(() => {
            window.location.reload();
          }, 500);
        }
      } else {
        showToast('error', data.message || '保存に失敗しました');
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<i class="bi bi-check-lg me-1"></i> 保存';
      }
    })
    .catch(error => {
      console.error('Error:', error);
      showToast('error', 'エラーが発生しました');
      submitBtn.disabled = false;
      submitBtn.innerHTML = '<i class="bi bi-check-lg me-1"></i> 保存';
    });
  });
});

function showToast(type, message) {
  if (typeof window.showNotification === 'function') {
    window.showNotification(message, type);
  } else {
    alert(message);
  }
}
</script>
